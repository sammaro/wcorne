# --- Power / Sleep ---
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
CONFIG_ZMK_IDLE_TIMEOUT=1800000


# --- Display (solo afecta al CENTRAL) ---
CONFIG_ZMK_DISPLAY=y
# CONFIG_ZMK_DISPLAY_TIMEOUT=30000
# CONFIG_ZMK_DISPLAY_SLEEP=y

# --- Bluetooth ---
CONFIG_BT_CTLR_TX_PWR_PLUS_4=y

# --- Keyboard identity ---
CONFIG_ZMK_KEYBOARD_NAME="Corne Sam"

